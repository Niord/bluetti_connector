name: Bug report
description: Report a reproducible bug in the Python runtime, local web page, Swift package, sample app, or repository automation.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        Do not paste access tokens, refresh tokens, `.env` contents, token-store files, full account data, or unnecessary device serial numbers into this form.

  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      description: Which repository area is affected?
      options:
        - Python backend or core
        - Local web page
        - Swift package
        - macOS sample app
        - Repository automation or docs
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is going wrong?
      placeholder: A short description of the problem and where it shows up.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest deterministic reproduction you know.
      placeholder: |
        1. Start ...
        2. Open ...
        3. Run ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
      placeholder: What actually happened? Include sanitized errors only.
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: Verification attempted
      description: Paste the exact local commands you ran, if any.
      placeholder: |
        .venv/bin/python -m pytest ...
        node --check ...
        swift test

  - type: checkboxes
    id: safety
    attributes:
      label: Safety checklist
      options:
        - label: I removed or redacted BLUETTI tokens, account details, and unnecessary device identifiers.
          required: true
        - label: I used deterministic local checks or a clearly described sanitized reproduction where possible.
          required: true
