name: Swift CI

on:
  push:
    paths:
      - 'swift/**'
      - '.github/workflows/swift.yml'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'swift/**'
      - '.github/workflows/swift.yml'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  swift:
    name: Swift Checks
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run BluettiKit tests
        working-directory: swift/BluettiKit
        run: |
          swift build --build-tests
          test_bundle="$(find .build -name 'BluettiKitPackageTests.xctest' -print -quit)"
          if [[ -z "$test_bundle" ]]; then
            echo "BluettiKitPackageTests.xctest not found under .build" >&2
            exit 1
          fi
          xcrun xctest "$test_bundle"

      - name: Build BluettiMonitorSample
        working-directory: swift/BluettiMonitorSample
        run: swift build